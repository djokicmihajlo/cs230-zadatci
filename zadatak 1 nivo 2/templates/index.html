<!doctype html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <title>Zadatak 1 nivo 2</title>
</head>
<body>
    <h1>Zadatak 1 nivo 2</h1>

    <form method="post">
        <label for="a">Prvi argument:</label><br>
        <input type="number" id="a" name="a" value="{{ a }}"><br><br>

        <label for="b">Drugi argument:</label><br>
        <input type="number" id="b" name="b" value="{{ b }}"><br><br>

        <button type="submit">Pozovi funkciju</button>
    </form>

    {% if greska %}
        <p>{{ greska }}</p>
    {% endif %}

    {% if rezultat is not none %}
        <p>Rezultat: {{ rezultat }}</p>
        <p>Vreme: {{ trajanje }} sekundi</p>

        {% if iz_kesa %}
            <p>Rezultat je vracen iz kesa.</p>
        {% else %}
            <p>Funkcija je izvrsena.</p>
        {% endif %}
    {% endif %}
</body>
</html>
